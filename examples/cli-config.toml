command = "serve"

[server]
host = "0.0.0.0"
port = 1234

[runtime]
max_seqs = 32
enable_search = true
search_embedding_model = "embedding-gemma"
# code_exec_permission = "auto"  # "auto" | "ask" | "deny"

[paged_attn]
mode = "auto"

# OS-level sandbox applied to model-generated code execution.
# mode = "auto"|"on"|"off" (auto = on for Linux/macOS, no-op elsewhere)
# Limits override SandboxPolicy::default() when set.
[sandbox]
mode = "auto"
max_memory_mb = 2048
max_cpu_secs = 300
max_procs = 64
network = "loopback"  # "none" | "loopback" | "full"

[[models]]
kind = "auto"
model_id = "meta-llama/Llama-3.2-3B-Instruct"

[models.quantization]
in_situ_quant = "4"

[[models]]
kind = "multimodal"
model_id = "Qwen/Qwen2-VL-2B-Instruct"

[models.multimodal]
max_num_images = 4

[[models]]
kind = "embedding"
model_id = "google/embeddinggemma-300m"
