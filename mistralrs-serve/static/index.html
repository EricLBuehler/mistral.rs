<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mistral.rs</title>
  <base href="/ui/">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="highlight.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sidebar overlay for mobile -->
  <div id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <!-- Sidebar header with logo -->
    <div class="sidebar-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/>
      </svg>
      <span class="sidebar-title">Mistral.rs</span>
    </div>

    <!-- Model selector -->
    <select id="modelSelect"></select>

    <!-- Action buttons -->
    <div class="sidebar-actions">
      <button id="newChatBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
      <button id="clearBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        Clear
      </button>
      <button id="renameBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Rename
      </button>
      <button id="deleteBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Delete
      </button>
    </div>

    <!-- Generation Settings (collapsible) -->
    <div class="sidebar-card">
      <div class="sidebar-card-header" id="settingsBtn">
        <h3>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Generation Settings
        </h3>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="sidebar-card-content" id="settingsPanel">
        <div class="setting-group">
          <label for="settingTemperature">Temperature: <span id="temperatureValue">0.70</span></label>
          <input type="range" id="settingTemperature" min="0" max="2" step="0.05" value="0.7" />
        </div>
        <div class="setting-group">
          <label for="settingTopP">Top P: <span id="topPValue">0.90</span></label>
          <input type="range" id="settingTopP" min="0" max="1" step="0.05" value="0.9" />
        </div>
        <div class="setting-group">
          <label for="settingTopK">Top K:</label>
          <input type="number" id="settingTopK" min="1" max="200" value="40" />
        </div>
        <div class="setting-group">
          <label for="settingMaxTokens">Max Tokens:</label>
          <input type="number" id="settingMaxTokens" min="1" max="32768" value="2048" />
        </div>
        <div class="setting-group">
          <label for="settingRepetitionPenalty">Repetition Penalty: <span id="repetitionPenaltyValue">1.10</span></label>
          <input type="range" id="settingRepetitionPenalty" min="1" max="2" step="0.05" value="1.1" />
        </div>
        <div class="setting-group">
          <label for="settingSystemPrompt">System Prompt:</label>
          <textarea id="settingSystemPrompt" rows="3" placeholder="Optional system instructions..."></textarea>
        </div>
        <button id="resetSettingsBtn" class="btn-secondary">Reset to Defaults</button>
      </div>
    </div>

    <!-- Web Search -->
    <div class="sidebar-card" id="webSearchCard">
      <div class="sidebar-card-header">
        <h3>Web Search</h3>
      </div>
      <div class="sidebar-card-content">
        <label class="toggle-label"><input type="checkbox" id="enableSearch" /> Enable web search</label>
        <div id="webSearchOptions" hidden>
          <label for="searchContextSize">Context size:</label>
          <select id="searchContextSize">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Chat list -->
    <ul id="chatList"></ul>

    <!-- Theme toggle at bottom -->
    <div class="sidebar-footer">
      <button id="themeToggle">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main chat area -->
  <main id="main">
    <!-- Top bar with hamburger (mobile) -->
    <div class="topbar">
      <button id="sidebarToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span id="connectionStatus" class="connection-status disconnected">Connecting…</span>
    </div>

    <!-- Chat log -->
    <div id="log"></div>

    <!-- Input form -->
    <form id="form">
      <div id="image-container"></div>
      <div id="audio-container"></div>
      <div id="text-files-container"></div>

      <textarea id="input" placeholder="Message Mistral.rs…" rows="1"></textarea>

      <!-- Hidden file inputs -->
      <input type="file" id="imageInput" accept="image/*" hidden />
      <input type="file" id="textInput" accept=".txt,.md,.markdown,.py,.js,.ts,.rs,.html,.css,.json,.xml,.yaml,.yml,.toml,.c,.cpp,.java,.go,.rb,.php,.sh,.sql,.log,.csv" hidden />
      <input type="file" id="audioInput" accept="audio/*" hidden />

      <!-- Action bar -->
      <div class="form-actions">
        <label for="imageInput" class="btn-icon" id="imageLabel" title="Upload image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </label>
        <label for="audioInput" class="btn-icon" id="audioLabel" title="Upload audio">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </label>
        <label for="textInput" class="btn-icon" id="textLabel" title="Upload file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </label>
        <div class="spacer"></div>
        <button type="button" class="btn-icon" id="stopBtn" title="Stop generation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
        <button type="submit" class="btn-send" title="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 3l0 18M5 11l7 7 7-7"/></svg>
        </button>
      </div>

      <div id="spinner" class="spinner hidden" aria-hidden="true"></div>
    </form>
  </main>

  <!-- Scripts (order matters!) -->
  <script src="marked.min.js"></script>
  <script src="purify.min.js"></script>
  <script src="highlight.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/models.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
