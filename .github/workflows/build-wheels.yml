name: Build and Package Python Wheels

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (Standard, CUDA, MKL)
          - os: ubuntu-22.04
            target: linux-x86_64
            args: "-p mistralrs mistralrs-mkl mistralrs-cuda"
          
          # Windows x86_64 (Standard, CUDA, MKL)
          - os: windows-latest
            target: windows-x86_64
            args: "-p mistralrs mistralrs-mkl mistralrs-cuda"

          # macOS aarch64 (Metal / All)
          - os: macos-latest
            target: macos-arm64
            args: "--all"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CUDA Toolkit
        if: matrix.target != 'macos-arm64' # macOS uses Metal, not CUDA
        uses: Jimver/cuda-toolkit@v0.2.34
        with:
          cuda: '12.1.0'
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
      - name: Install patchelf (Linux only)
        if: runner.os == 'Linux'
        run: python -m pip install patchelf
      - name: Build Wheels
        run: python scripts/build_wheels.py ${{ matrix.args }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "15.0"
          MATURIN_PY_EXE: python

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: wheels/**/*.whl