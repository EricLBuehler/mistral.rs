name: CI / cuda

on:
  workflow_dispatch:
  pull_request:

jobs:
  test-cuda:
    name: CI / cuda (${{ matrix.name }})

    # For security, only run automatically for:
    # - PRs from the same repo (not forks)
    # - manual workflow dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.name }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    runs-on: [self-hosted, Linux, ARM64, gpu, cuda]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cuda
            features: cuda,nccl
            cuda: "13.0"
            test_args: ""
          # cutile-compiler 0.1.0 emits Tile IR 13.2 bytecode, so tileiras (and thus the toolkit) must be >= 13.2.
          - name: cuda+cutile
            features: cuda,cutile
            cuda: "13.2"
            test_args: "--workspace --exclude mistralrs-flash-attn"
          # - name: cuda+nccl
          #   features: cuda,nccl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential libssl-dev protobuf-compiler pkg-config

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pin CUDA toolkit to ${{ matrix.cuda }}
        run: |
          CUDA_DIR=/usr/local/cuda-${{ matrix.cuda }}
          if [ ! -d "$CUDA_DIR" ]; then
            echo "::error::$CUDA_DIR not found on runner"
            exit 1
          fi
          echo "$CUDA_DIR/bin" >> $GITHUB_PATH
          echo "CUDA_HOME=$CUDA_DIR" >> $GITHUB_ENV
          echo "CUDA_PATH=$CUDA_DIR" >> $GITHUB_ENV
          echo "CUDA_TOOLKIT_PATH=$CUDA_DIR" >> $GITHUB_ENV
          # The driver JITs PTX only up to its native CUDA level; newer toolkits need the forward-compat libcuda.
          LIB_DIRS="$CUDA_DIR/lib64"
          NATIVE=$(nvidia-smi --query | grep -m1 "CUDA Version" | grep -oE "[0-9]+\.[0-9]+")
          if [ "$(printf '%s\n' "$NATIVE" "${{ matrix.cuda }}" | sort -V | tail -1)" != "$NATIVE" ]; then
            [ -d "$CUDA_DIR/compat" ] || sudo apt-get install -y cuda-compat-$(echo "${{ matrix.cuda }}" | tr . -)
            LIB_DIRS="$CUDA_DIR/compat:$LIB_DIRS"
          fi
          echo "LD_LIBRARY_PATH=$LIB_DIRS:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: CUDA sanity
        run: |
          nvidia-smi || true
          nvcc --version || true

      - name: Clippy
        run: cargo clippy --features ${{ matrix.features }}

      - name: Test
        run: cargo test ${{ matrix.test_args }} --features ${{ matrix.features }}
