name: docs

on:
  push:
    branches: ["master"]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "docs/**"
      - "examples/**"
      - "mistralrs/examples/**"
      - "mistralrs-cli/**"
      - "mistralrs-pyo3/**"
      - "mistralrs-server-core/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "docs/**"
      - "examples/**"
      - "mistralrs/examples/**"
      - "mistralrs-cli/**"
      - "mistralrs-pyo3/**"
      - "mistralrs-server-core/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generated:
    if: github.repository == 'EricLBuehler/mistral.rs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Regenerate docs artifacts
        working-directory: docs
        run: npm run generate

      - name: Ensure generated artifacts are committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated artifacts are out of date."
            echo
            echo "Run this locally and commit the result:"
            echo "  cd docs && npm run generate"
            echo
            git status --short
            git diff --stat
            git diff --exit-code
            exit 1
          fi

  build:
    if: github.repository == 'EricLBuehler/mistral.rs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Setup Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/dist
          retention-days: 7

  deploy:
    if: github.repository == 'EricLBuehler/mistral.rs' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
